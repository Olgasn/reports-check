name: CI

on:
  push:
    branches: [dotnet-rewrite, main]
  pull_request:
    branches: [dotnet-rewrite, main]

jobs:
  build-and-test:
    name: 'Сборка и тесты (.NET)'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Восстановление зависимостей
        run: dotnet restore ReportsCheck.slnx

      - name: Сборка
        run: dotnet build ReportsCheck.slnx --no-restore --configuration Release

      - name: Тесты
        run: dotnet test --no-build --configuration Release --verbosity normal
