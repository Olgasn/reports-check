name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: 'Сервер: линтер + тесты'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    env:
      DATABASE: ./db/test.sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: Линтер
        run: npm run lint

      - name: Модульные тесты
        run: npm test

  client:
    name: 'Клиент: линтер + сборка'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    env:
      VITE_API_URL: http://localhost:3000/api
      VITE_WS_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: Линтер
        run: npm run lint

      - name: Сборка
        run: npm run build
